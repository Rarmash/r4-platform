name: Docker Hub

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "hub-v*.*.*"

permissions:
  contents: read

env:
  IMAGE_NAME: r4-hub

jobs:
  hub-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test
        run: ./gradlew clean test --no-daemon

      - name: Build Hub JAR
        run: ./gradlew :hub:bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME || 'rarmash' }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Hub release version
        id: release_version
        if: startsWith(github.ref, 'refs/tags/hub-v')
        shell: bash
        run: |
          set -Eeuo pipefail
          version="${GITHUB_REF_NAME#hub-v}"
          [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"
          printf 'major_minor=%s\n' "${version%.*}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME || 'rarmash' }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.release_version.outputs.version || 'none' }},enable=${{ startsWith(github.ref, 'refs/tags/hub-v') }}
            type=raw,value=${{ steps.release_version.outputs.major_minor || 'none' }},enable=${{ startsWith(github.ref, 'refs/tags/hub-v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/hub-v') }}

      - name: Build Hub Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hub/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
