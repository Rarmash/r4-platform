name: Linux Agent

on:
  pull_request:
    paths:
      - "agent-linux/**"
      - "protocol/**"
      - ".github/workflows/linux-agent.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "agent-linux/**"
      - "protocol/**"
      - ".github/workflows/linux-agent.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test and build distribution
        run: ./gradlew :agent-linux:test :agent-linux:installDist --no-daemon

      - name: Validate installer
        run: |
          bash -n agent-linux/install.sh
          shellcheck agent-linux/install.sh

      - name: Build and inspect release package
        env:
          PACKAGE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'development' }}
        run: |
          set -Eeuo pipefail
          package_dir="build/release/r4-agent-linux"
          mkdir -p "${package_dir}/app" "${package_dir}/deploy"
          cp -a agent-linux/build/install/agent-linux/. "${package_dir}/app/"
          cp agent-linux/deploy/r4-agent.service "${package_dir}/deploy/"
          cp agent-linux/deploy/r4-agent.env.example "${package_dir}/deploy/"
          cp agent-linux/install.sh "${package_dir}/"
          printf '%s\n' "${PACKAGE_VERSION}" > "${package_dir}/VERSION"
          chmod 0755 "${package_dir}/install.sh" "${package_dir}/app/bin/agent-linux"
          tar -C build/release -czf "build/release/r4-agent-linux.tar.gz" r4-agent-linux
          (
            cd build/release
            sha256sum r4-agent-linux.tar.gz > r4-agent-linux.tar.gz.sha256
          )
          tar -tzf build/release/r4-agent-linux.tar.gz | grep -qx 'r4-agent-linux/app/bin/agent-linux'
          tar -tzf build/release/r4-agent-linux.tar.gz | grep -qx 'r4-agent-linux/deploy/r4-agent.service'
          tar -tzf build/release/r4-agent-linux.tar.gz | grep -qx 'r4-agent-linux/install.sh'
          tar -tzf build/release/r4-agent-linux.tar.gz | grep -qx 'r4-agent-linux/VERSION'
          (
            cd build/release
            sha256sum --check --strict r4-agent-linux.tar.gz.sha256
          )

      - name: Upload verified package
        uses: actions/upload-artifact@v4
        with:
          name: r4-agent-linux-${{ github.sha }}
          path: |
            build/release/r4-agent-linux.tar.gz
            build/release/r4-agent-linux.tar.gz.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified package
        uses: actions/download-artifact@v4
        with:
          name: r4-agent-linux-${{ github.sha }}
          path: release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" \
            release/r4-agent-linux.tar.gz \
            release/r4-agent-linux.tar.gz.sha256 \
            --clobber
