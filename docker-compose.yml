services:
  postgres:
    image: postgres:17.6-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: r4
      POSTGRES_USER: r4
      POSTGRES_PASSWORD: ${R4_DB_PASSWORD}

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U r4 -d r4
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  hub:
    build:
      context: .
      dockerfile: hub/Dockerfile

    restart: unless-stopped

    environment:
      R4_DB_URL: jdbc:postgresql://postgres:5432/r4
      R4_DB_USERNAME: r4
      R4_DB_PASSWORD: ${R4_DB_PASSWORD}
      R4_DB_POOL_SIZE: 5

    ports:
      - "127.0.0.1:8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - http://localhost:8080/actuator/health
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile

    restart: unless-stopped

    environment:
      R4_HUB_URL: http://hub:8080
      R4_IDENTITY_FILE: /var/lib/r4/simulator-id

    volumes:
      - simulator_data:/var/lib/r4

    depends_on:
      hub:
        condition: service_healthy

volumes:
  postgres_data:
  simulator_data:
